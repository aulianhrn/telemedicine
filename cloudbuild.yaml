steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/telemedicine-backend',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/telemedicine-backend'
      ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run',
        'deploy',
        'backend',
        '--image',
        'gcr.io/$PROJECT_ID/telemedicine-backend',
        '--region',
        'us-central1',
        '--port',
        '8080',
        '--allow-unauthenticated'
      ]

options:
  logging: CLOUD_LOGGING_ONLY