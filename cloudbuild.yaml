steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/telemedicine-backend',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/telemedicine-backend'
      ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run',
        'deploy',
        'backend',
        '--image',
        'gcr.io/$PROJECT_ID/telemedicine-backend',
        '--region',
        'us-central1',
        '--port',
        '8080',
        '--allow-unauthenticated',
        '--set-env-vars',
        'DB_HOST=34.42.191.35,DB_PORT=3306,DB_USER=telemed,DB_PASSWORD=Telemed123!,DB_NAME=telemedicine_posyandu,DB_SSL=true,JWT_SECRET=ganti_dengan_secret_yang_panjang'
      ]

options:
  logging: CLOUD_LOGGING_ONLY